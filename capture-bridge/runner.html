<!doctype html><html><head><meta charset="utf-8"><title>Capture Run</title><style>
body{font:13px/1.5 system-ui,sans-serif;max-width:760px;margin:24px auto;padding:0 16px;color:#1c2733}
h1{font-size:16px;color:#2B6FD4}
#log{background:#f6f8fb;border:1px solid #d7dee7;border-radius:10px;padding:12px;min-height:200px;white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:12px}
button{padding:8px 16px;border-radius:8px;border:1px solid #d7dee7;background:#fff;cursor:pointer;margin-right:8px}
#stop{color:#8B2252}
.ok{color:#137a3a}.err{color:#b3261e}
</style></head><body>
<h1>Capture run</h1>
<p>Opens each saved search, scrolls to the bottom at human pace, and moves on. Captured pages sync into the tracker whenever it's open. Keep this tab open; closing it stops the run.</p>
<button id="stop">Stop run</button>
<div id="log"></div>
<script src="runner.js"></script>
</body></html>
